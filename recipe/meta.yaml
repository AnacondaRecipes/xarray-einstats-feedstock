# Generated using grayskull; edited by @ericmjl.
{% set name = "xarray-einstats" %}
{% set version = "0.9.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/xarray_einstats-{{ version }}.tar.gz
  sha256: 39b373deed43592c41d3fbf8863af62e19e01c1ae553ae5ff059a8df78d995c6

build:
  skip: true  # [py<311]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - pip
    - python
    - flit-core >=3.4,<4
  run:
    - numpy >=1.25
    - python
    - scipy >=1.11
    - xarray >=2023.06.0
  run_constrained:
    - numba >=0.55

test:
  imports:
    - xarray_einstats
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/arviz-devs/xarray-einstats
  summary: Stats, linear algebra and einops for xarray.
  description: |
    xarray-einstats is an open source Python library part of the ArviZ project. It acts as a bridge between the xarray
    library for labelled arrays and libraries for raw arrays such as NumPy or SciPy.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  doc_url: https://einstats.python.arviz.org
  dev_url: https://github.com/arviz-devs/xarray-einstats

extra:
  recipe-maintainers:
    - ericmjl
    - OriolAbril
